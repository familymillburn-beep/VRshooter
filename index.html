<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driving VR – AR City Moving Camera</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
    }
    #video {
        display: none; /* we draw it manually */
    }
    #vr {
        position: absolute;
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="vr"></canvas>

<script>
// CAMERA FEED
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
    document.getElementById("video").srcObject = stream;
})
.catch(err => console.log("Camera error:", err));

// CANVAS
const canvas = document.getElementById("vr");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// HEAD TRACKING
let yaw = 0, pitch = 0;
window.addEventListener("deviceorientation", e => {
    if (e.gamma != null && e.beta != null) {
        yaw = e.gamma / 40;   // left/right tilt
        pitch = e.beta / 60;  // forward/back tilt
    }
});

// BUILDINGS
const buildings = [];
function initBuildings() {
    buildings.length = 0;
    for (let i = 0; i < 12; i++) {
        buildings.push({
            x: (i - 6) * 2,
            z: 5 + Math.random() * 15,
            h: 2 + Math.random() * 4
        });
    }
}
initBuildings();

// PROJECTOR
function project(x, y, z, eyeOffset, w, h) {
    const fov = 1.2;
    const ex = eyeOffset;
    const zx = x - ex - yaw * 4;
    const zy = z + 1;

    const scale = fov / zy;
    const sx = w / 2 + zx * scale * w * 0.12;
    const sy = h * 0.8 - y * scale * h * 0.25 - pitch * 40;

    return { x: sx, y: sy };
}

// DRAW LOOP
function draw() {
    const video = document.getElementById("video");
    const w = canvas.width;
    const h = canvas.height;
    const half = w / 2;

    ctx.clearRect(0, 0, w, h);

    drawEye(0, half, h, -0.5, video);
    drawEye(half, half, h, 0.5, video);

    requestAnimationFrame(draw);
}

function drawEye(xOffset, w, h, eyeOffset, video) {
    ctx.save();
    ctx.translate(xOffset, 0);

    // MOVING CAMERA FEED
    const camShiftX = yaw * 80;
    const camShiftY = pitch * 60;
    const camScale = 1.15;

    ctx.save();
    ctx.translate(camShiftX, camShiftY);
    ctx.scale(camScale, camScale);

    ctx.drawImage(
        video,
        - (w * (camScale - 1)) / 2,
        - (h * (camScale - 1)) / 2,
        w,
        h
    );

    ctx.restore();

    // Darken slightly
    ctx.fillStyle = "rgba(0,0,20,0.25)";
    ctx.fillRect(0, 0, w, h);

    // Ground
    ctx.fillStyle = "rgba(10, 10, 30, 0.8)";
    ctx.fillRect(0, h * 0.8, w, h * 0.2);

    // Road lines
    ctx.strokeStyle = "rgba(80,80,120,0.8)";
    ctx.lineWidth = 2;
    for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        const sx = (w / 2) + i * 40;
        ctx.moveTo(sx, h * 0.8);
        ctx.lineTo(w / 2 + i * 10, h * 0.4);
        ctx.stroke();
    }

    // BUILDINGS
    buildings.forEach(b => {
        const base = project(b.x, 0, b.z, eyeOffset, w, h);
        const top = project(b.x, b.h, b.z, eyeOffset, w, h);

        const widthWorld = 1.2;
        const left = project(b.x - widthWorld/2, 0, b.z, eyeOffset, w, h);
        const right = project(b.x + widthWorld/2, 0, b.z, eyeOffset, w, h);
        const leftTop = project(b.x - widthWorld/2, b.h, b.z, eyeOffset, w, h);
        const rightTop = project(b.x + widthWorld/2, b.h, b.z, eyeOffset, w, h);

        // Front face
        ctx.fillStyle = "rgba(40, 80, 140, 0.9)";
        ctx.beginPath();
        ctx.moveTo(left.x, left.y);
        ctx.lineTo(right.x, right.y);
        ctx.lineTo(rightTop.x, rightTop.y);
        ctx.lineTo(leftTop.x, leftTop.y);
        ctx.closePath();
        ctx.fill();

        // Windows
        ctx.fillStyle = "rgba(255,255,200,0.6)";
        for (let r = 0; r < 5; r++) {
            for (let c = 0; c < 3; c++) {
                const t = r / 6;
                const s = (c + 1) / 4;
                const wx = left.x + (right.x - left.x) * s;
                const wy = left.y + (leftTop.y - left.y) * t;
                ctx.fillRect(wx - 3, wy - 3, 6, 6);
            }
        }
    });

    // Cockpit
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, h * 0.7, w, h * 0.3);

    // Steering wheel
    ctx.strokeStyle = "white";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(w/2 + yaw*40, h*0.87, 60, 0, Math.PI*2);
    ctx.stroke();

    ctx.restore();
}

draw();
</script>

</body>
</html>
